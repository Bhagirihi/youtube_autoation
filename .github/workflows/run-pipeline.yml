# Horror Auto Factory — run full pipeline (story → audio → images → video → thumbnail)
# Scheduled: daily at 9:00 PM IST → pipeline + YouTube upload.
# Manual: workflow_dispatch with optional "Upload to YouTube".
#
# Important: Run this workflow from the branch that has this file (e.g. main). If you use branch HPA,
# merge main into HPA so the Check YouTube/Drive auth step and upload script stay in sync.
#
# Shortcut: add ONE secret in Settings → Secrets → Actions:
#   ENV_FILE = entire contents of your .env file (copy-paste). All keys (Gemini, TTS, YouTube, etc.) in one go.
# For YouTube/Drive upload, ENV_FILE must include: YT_CLIENT_SECRET_JSON (or YT_CLIENT_ID + YT_CLIENT_SECRET + YT_REDIRECT_URI) and YT_TOKEN_JSON or YT_REFRESH_TOKEN. Set DRIVE_UPLOAD=1 to also upload video/thumbnail/metadata to Google Drive (before YouTube).
name: Run pipeline

on:
  schedule:
    # 9:00 PM IST (15:30 UTC) every day — runs pipeline and uploads to YouTube
    - cron: "30 15 * * *"
  workflow_dispatch:
    inputs:
      upload_to_youtube:
        description: "Upload video to YouTube after pipeline"
        required: false
        default: false
        type: boolean

env:
  DATA_DIR: ${{ github.workspace }}
  NODE_ENV: production

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Free disk space to avoid "No space left on device" during ffmpeg encode (6+ min video)
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system deps (ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create working dirs
        run: |
          mkdir -p temp voiceover images output thumbnails

      # One secret: paste your full .env into repo secret "ENV_FILE" (Settings → Secrets → Actions).
      - name: Create .env from ENV_FILE secret
        id: create_env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "::error::Add repository secret ENV_FILE with your full .env contents (copy-paste from local .env)."
            exit 1
          fi
          printf '%s' "$ENV_FILE" > .env
          echo "Loaded .env from ENV_FILE secret"

      # When upload will run, validate auth with same logic as upload script (fail early with exact missing vars).
      - name: Validate YouTube/Drive auth (when upload requested)
        id: yt_check
        if: github.event_name == 'schedule' || github.event.inputs.upload_to_youtube == 'true'
        run: |
          node scripts/checkYoutubeAuth.js && echo "has_yt_token=true" >> $GITHUB_OUTPUT || exit 1
      - name: Note (upload not requested)
        if: github.event_name != 'schedule' && github.event.inputs.upload_to_youtube != 'true'
        run: echo "Upload not requested; skipping auth check."

      - name: Run pipeline
        run: node index.js

      - name: Full story in job summary
        if: success()
        run: |
          echo "## Full story" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f temp/story.json ]; then
            echo "**Title:** $(jq -r '.title // "—"' temp/story.json)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "<details><summary>Click to expand full story</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<pre>" >> $GITHUB_STEP_SUMMARY
          if [ -f temp/story.txt ]; then
            # Escape HTML so </pre> in story doesn't break the block
            sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' temp/story.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "(story not found)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "</pre>" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Also available in **pipeline-output** artifact as \`temp/story.txt\` and \`temp/story.json\`." >> $GITHUB_STEP_SUMMARY

      # Drive (if DRIVE_UPLOAD=1) then YouTube — same order as uploadYoutubeFromCLI.js
      - name: Upload to Drive (if DRIVE_UPLOAD=1) and YouTube
        if: success() && (github.event_name == 'schedule' || github.event.inputs.upload_to_youtube == 'true') && steps.yt_check.outputs.has_yt_token == 'true'
        run: node scripts/uploadYoutubeFromCLI.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: |
            output/final.mp4
            thumbnails/thumb.jpg
            temp/story.json
            temp/story.txt
          if-no-files-found: warn
